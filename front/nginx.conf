server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 '{"data":{"status":"ok","service":"medflow-front"}}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
