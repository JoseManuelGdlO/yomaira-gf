# EasyPanel / producción — NO publicar puertos en el host.
# EasyPanel enruta el tráfico vía Traefik al puerto interno del contenedor.
# Para probar en local con localhost:3000 / :4000 usa: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  back:
    build: ./back
    expose:
      - "4000"
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-medflow}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-medflow}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      PUBLIC_BOOKING_SECRET: ${PUBLIC_BOOKING_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-MedFlow}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:contacto@medflow.local}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}

  front:
    build:
      context: ./front
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api/v1}
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:3000}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - back
